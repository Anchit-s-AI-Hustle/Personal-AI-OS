<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b0f17">
<title>Personal AI OS — Task Board</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%236366f1'/><text x='16' y='22' font-size='15' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>AI</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
<style>
  :root{
    --bg:#0b0f17;--panel:#121826;--panel2:#0e1420;--line:#1f2937;
    --ink:#e6edf5;--dim:#93a1b5;--mute:#5b6b82;--accent:#6366f1;--accent2:#8b5cf6;
    --todo:#3b82f6;--prog:#f59e0b;--done:#22c55e;--drop:#64748b;--radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{max-width:100%;overflow-x:hidden}
  body{font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);
    min-height:100vh;background:
    radial-gradient(1100px 500px at 12% -8%,rgba(99,102,241,.12),transparent 60%),
    radial-gradient(900px 480px at 100% 0%,rgba(139,92,246,.10),transparent 55%),var(--bg)}
  header{position:sticky;top:0;z-index:40;background:rgba(11,15,23,.88);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);padding:12px clamp(14px,3vw,28px)}
  .hrow{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;white-space:nowrap}
  .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:grid;place-items:center;font-size:13px;font-weight:800;color:#fff}
  .brand small{display:block;font-weight:500;font-size:10.5px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase}
  .spacer{flex:1}
  .search{flex:1;min-width:150px;max-width:440px;position:relative}
  .search input{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:10px;
    color:var(--ink);padding:9px 12px 9px 34px;font-size:13.5px;outline:none}
  .search input:focus{border-color:var(--accent)}
  .search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.5}
  .btn{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:10px;
    padding:9px 13px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:0}
  .filters{display:flex;gap:8px;flex-wrap:wrap;padding:12px clamp(14px,3vw,28px) 0}
  .chip{background:var(--panel);border:1px solid var(--line);color:var(--dim);border-radius:99px;
    padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap}
  .chip.on{background:rgba(99,102,241,.16);border-color:var(--accent);color:#c7ccff}
  .meta{padding:10px clamp(14px,3vw,28px) 0;font-size:12px;color:var(--mute)}
  .board{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;
    padding:14px clamp(14px,3vw,28px) 40px;align-items:start}
  @media(max-width:1024px){.board{grid-template-columns:repeat(2,minmax(0,1fr))}}
  @media(max-width:600px){.board{grid-template-columns:1fr}}
  .col{background:var(--panel2);border:1px solid var(--line);border-radius:var(--radius);
    display:flex;flex-direction:column;min-height:120px;max-height:calc(100vh - 230px);min-width:0}
  .col-h{display:flex;align-items:center;gap:9px;padding:13px 14px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:var(--panel2);border-radius:var(--radius) var(--radius) 0 0;z-index:1}
  .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .col-h h3{font-size:13px;font-weight:700}
  .cnt{margin-left:auto;font-size:11px;font-weight:700;color:var(--dim);background:var(--panel);
    border:1px solid var(--line);border-radius:99px;padding:2px 9px;min-width:26px;text-align:center}
  .col-body{padding:11px;display:flex;flex-direction:column;gap:11px;overflow-y:auto;min-width:0}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px 13px;
    cursor:pointer;transition:border-color .15s,transform .05s;min-width:0}
  .card:hover{border-color:#33415a}
  .card:active{transform:scale(.997)}
  .card h4{font-size:13.5px;font-weight:650;line-height:1.4;overflow-wrap:anywhere;word-break:break-word}
  .card .desc{font-size:12px;color:var(--dim);line-height:1.5;margin-top:6px;overflow-wrap:anywhere;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .b{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap;overflow-wrap:anywhere}
  .b-src{background:rgba(139,92,246,.14);color:#c4b5fd;border:1px solid rgba(139,92,246,.3)}
  .b-pillar{background:rgba(34,197,94,.12);color:#86efac;border:1px solid rgba(34,197,94,.28)}
  .u-Low{background:rgba(71,85,105,.25);color:#cbd5e1}
  .u-Medium{background:rgba(59,130,246,.16);color:#93c5fd}
  .u-High{background:rgba(245,158,11,.16);color:#fcd34d}
  .u-Critical{background:rgba(239,68,68,.18);color:#fca5a5}
  .meta-line{font-size:11px;color:var(--mute);margin-top:8px;display:flex;align-items:center;gap:6px;overflow-wrap:anywhere}
  .meta-line.soon{color:#fca5a5}
  .empty{padding:24px 14px;text-align:center;color:var(--mute);font-size:12.5px}
  .nodata{margin:18px clamp(14px,3vw,28px);border:1.5px dashed var(--line);border-radius:var(--radius);
    padding:38px 22px;text-align:center;background:var(--panel2)}
  .nodata h2{font-size:18px;margin-bottom:8px}
  .nodata p{color:var(--dim);font-size:13.5px;line-height:1.7;max-width:560px;margin:0 auto 16px}
  .nodata code{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:2px 7px;font-size:12px;color:#c7ccff}
  .dragover{border-color:var(--accent);background:rgba(99,102,241,.06)}
  .modal{position:fixed;inset:0;z-index:80;background:rgba(3,6,12,.72);backdrop-filter:blur(6px);
    display:none;align-items:center;justify-content:center;padding:18px}
  .modal.open{display:flex}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:16px;max-width:600px;width:100%;
    max-height:88vh;overflow-y:auto;padding:22px}
  .sheet .x{float:right;font-size:22px;line-height:1;color:var(--dim);cursor:pointer;background:none;border:0}
  .sheet h3{font-size:18px;line-height:1.35;margin:2px 36px 12px 0;overflow-wrap:anywhere}
  .kv{margin-top:14px}
  .kv .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--mute);margin-bottom:4px;font-weight:700}
  .kv .v{font-size:13.5px;color:var(--ink);line-height:1.6;white-space:pre-wrap;overflow-wrap:anywhere}
  .kv .v a{color:#c7ccff}
  .foot{padding:6px clamp(14px,3vw,28px) 40px;color:var(--mute);font-size:11.5px;text-align:center;line-height:1.7}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="brand"><span class="logo">AI</span><span>Personal AI OS<small>Task Board</small></span></div>
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="search" placeholder="Search tasks, people, summaries…" autocomplete="off">
    </div>
    <div class="spacer"></div>
    <button class="btn" id="loadBtn">⬆ Load export</button>
    <input id="file" type="file" accept=".xlsx,.csv,.json" hidden>
    <button class="btn primary" id="refreshBtn">↻ Refresh</button>
  </div>
  <div class="filters" id="srcFilters"></div>
</header>

<div class="meta" id="meta"></div>
<div id="boardWrap"></div>
<div class="foot" id="foot"></div>
<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>

<script>
const COLUMNS=[
  {key:"open",title:"To Do",color:"var(--todo)"},
  {key:"in_progress",title:"In Progress",color:"var(--prog)"},
  {key:"done",title:"Done",color:"var(--done)"},
  {key:"dropped",title:"Dropped",color:"var(--drop)"},
];
const URANK={Critical:0,High:1,Medium:2,Low:3};
let TASKS=[],activeSrc="All",query="";
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function normStatus(status,done){
  const d=String(done).toLowerCase()==="true"||done===true;
  const s=String(status||"").toLowerCase();
  if(d||["done","closed","complete","completed"].includes(s))return"done";
  if(["dropped","cancelled","canceled"].includes(s))return"dropped";
  if(["in_progress","in progress","doing","wip"].includes(s))return"in_progress";
  return"open";
}
function normalize(t){
  t.status=normStatus(t.status,t.done);
  t.urgency=(t.urgency||"Medium"); t.urgency=t.urgency.charAt(0).toUpperCase()+t.urgency.slice(1).toLowerCase();
  if(!(t.urgency in URANK))t.urgency="Medium";
  return t;
}
function sources(){return["All",...Array.from(new Set(TASKS.map(t=>t.source_type).filter(Boolean)))];}
function matches(t){
  if(activeSrc!=="All"&&t.source_type!==activeSrc)return false;
  if(!query)return true;
  return [t.task,t.task_description,t.summary,t.spoc,t.growth_pillar,t.rationale].join(" ").toLowerCase().includes(query);
}
function dueSoon(d){if(!d)return false;const t=Date.parse(d);return!isNaN(t)&&t-Date.now()<3*864e5;}

function render(){
  $("#srcFilters").innerHTML=sources().map(s=>`<span class="chip ${s===activeSrc?'on':''}" data-src="${esc(s)}">${esc(s)}</span>`).join("");
  if(!TASKS.length){
    $("#meta").textContent="";
    $("#boardWrap").innerHTML=`<div class="nodata" id="dz">
      <h2>No tasks loaded</h2>
      <p>This board shows tasks Personal&nbsp;AI&nbsp;OS extracted from your emails, meetings and voice memos.
      The committed <code>data.json</code> is empty or missing here.</p>
      <p>Run <code>python web/build_board.py</code> locally to generate it from <code>tasks.xlsx</code>,
      or <b>drag an .xlsx / .csv / .json export anywhere on this page</b> — it’s parsed in your browser, never uploaded.</p>
      <button class="btn primary" id="dzBtn">⬆ Choose a file</button></div>`;
    $("#dzBtn").onclick=()=>$("#file").click(); wireDrop($("#dz")); $("#foot").textContent="";return;
  }
  const vis=TASKS.filter(matches);
  $("#meta").innerHTML=`<b style="color:var(--dim)">${vis.length}</b> of ${TASKS.length} tasks`
    +(activeSrc!=="All"?` · source <b style="color:var(--dim)">${esc(activeSrc)}</b>`:"")
    +(query?` · “${esc(query)}”`:"");
  const by=Object.fromEntries(COLUMNS.map(c=>[c.key,[]]));
  vis.forEach(t=>(by[t.status]||by.open).push(t));
  for(const k in by)by[k].sort((a,b)=>URANK[a.urgency]-URANK[b.urgency]);
  $("#boardWrap").innerHTML=`<div class="board">`+COLUMNS.map(c=>{
    const it=by[c.key];
    return`<section class="col"><div class="col-h"><span class="dot" style="background:${c.color}"></span>
      <h3>${c.title}</h3><span class="cnt">${it.length}</span></div>
      <div class="col-body">${it.length?it.map(card).join(""):`<div class="empty">Nothing here</div>`}</div></section>`;
  }).join("")+`</div>`;
  document.querySelectorAll(".card").forEach(el=>el.onclick=()=>openModal(el.dataset.id));
  $("#foot").textContent=`Generated from ${window.__SRC__||"export"} · ${TASKS.length} tasks · read-only`;
}
function card(t){
  const due=t.deadline?`<div class="meta-line ${dueSoon(t.deadline)?'soon':''}">🗓 ${esc(t.deadline)}</div>`:"";
  const who=t.spoc?`<div class="meta-line">👤 ${esc(t.spoc)}</div>`:"";
  return`<article class="card" data-id="${esc(t.id)}">
    <h4>${esc(t.task||"(untitled task)")}</h4>
    ${t.task_description?`<div class="desc">${esc(t.task_description)}</div>`:""}
    <div class="badges"><span class="b u-${t.urgency}">${esc(t.urgency)}</span>
      ${t.source_type?`<span class="b b-src">${esc(t.source_type)}</span>`:""}
      ${t.growth_pillar?`<span class="b b-pillar">${esc(t.growth_pillar)}</span>`:""}</div>
    ${who}${due}</article>`;
}
function openModal(id){
  const t=TASKS.find(x=>String(x.id)===String(id));if(!t)return;
  const row=(k,v)=>v?`<div class="kv"><div class="k">${k}</div><div class="v">${esc(v)}</div></div>`:"";
  const link=t.source_link?`<div class="kv"><div class="k">Source link</div><div class="v"><a href="${esc(t.source_link)}" target="_blank" rel="noopener">${esc(t.source_link)}</a></div></div>`:"";
  $("#sheet").innerHTML=`<button class="x" onclick="closeModal()">×</button>
    <h3>${esc(t.task||"(untitled task)")}</h3>
    <div class="badges"><span class="b u-${t.urgency}">${esc(t.urgency)}</span>
      ${t.source_type?`<span class="b b-src">${esc(t.source_type)}</span>`:""}
      ${t.growth_pillar?`<span class="b b-pillar">${esc(t.growth_pillar)}</span>`:""}
      <span class="b" style="background:var(--panel2);color:var(--dim);border:1px solid var(--line)">${esc(t.status)}</span></div>
    ${row("Description",t.task_description)}${row("Summary / remarks",t.summary)}
    ${row("Why we're doing this",t.rationale)}${row("SPOC / from",t.spoc)}
    ${row("Deadline",t.deadline)}${row("Given on",t.created_at)}${link}`;
  $("#modal").classList.add("open");
}
function closeModal(){$("#modal").classList.remove("open");}
$("#modal").onclick=e=>{if(e.target.id==="modal")closeModal();};
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});

async function loadCommitted(){
  try{const r=await fetch("data.json?_="+Date.now());if(!r.ok)throw 0;
    const j=await r.json();TASKS=(j.tasks||[]).map(normalize);window.__SRC__=j.generated_from||"data.json";}
  catch{TASKS=[];}
  render();
}
function ingest(rows){
  TASKS=rows.map((d,i)=>{
    const g=(...ks)=>{for(const k of ks){const h=Object.keys(d).find(x=>x.toLowerCase().replace(/[^a-z]/g,"")===k);if(h&&d[h]!=null&&d[h]!=="")return d[h];}return"";};
    let src=g("source","sourcetype","type");
    let spoc=g("spoc","senderorspeaker","sender","speaker","from");
    if(String(src).toLowerCase().startsWith("email")){if(!spoc&&String(src).includes(" from "))spoc=String(src).split(" from ")[1];src="Email";}
    return normalize({
      id:g("taskid","id")||i+1,source_type:src,source_link:g("sourcelink","link"),
      task:g("taskheading","task","heading","title"),task_description:g("taskdescription","description"),
      rationale:g("whywaredoingthis","whyweredoingthis","rationale","why"),growth_pillar:g("growthpillar","pillar"),
      deadline:g("taskdeadline","deadline","due"),urgency:g("priority","urgency")||"Medium",spoc:spoc,
      summary:g("remarks","allupdates","summary"),status:g("status")||"open",done:g("done"),created_at:g("taskgivenon","createdat","created"),
    });
  });
  window.__SRC__="uploaded file";activeSrc="All";render();
}
function handleFile(file){
  const ext=(file.name.split(".").pop()||"").toLowerCase(),rd=new FileReader();
  rd.onload=()=>{try{
    if(ext==="json"){const j=JSON.parse(rd.result);ingest(j.tasks||j);}
    else{const wb=XLSX.read(rd.result,{type:"array"});
      const sn=wb.SheetNames.includes("All Tasks")?"All Tasks":(wb.SheetNames.includes("Master Task List")?"Master Task List":wb.SheetNames[0]);
      ingest(XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:""}));}
  }catch(e){alert("Could not parse: "+e);}};
  if(ext==="json")rd.readAsText(file);else rd.readAsArrayBuffer(file);
}
function wireDrop(el){if(!el)return;
  ["dragover","dragenter"].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();el.classList.add&&el.classList.add("dragover");}));
  ["dragleave","drop"].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();el.classList.remove&&el.classList.remove("dragover");}));
  el.addEventListener("drop",e=>{const f=e.dataTransfer.files[0];if(f)handleFile(f);});
}
$("#file").onchange=e=>{const f=e.target.files[0];if(f)handleFile(f);};
$("#loadBtn").onclick=()=>$("#file").click();
$("#refreshBtn").onclick=loadCommitted;
$("#q").oninput=e=>{query=e.target.value.trim().toLowerCase();render();};
$("#srcFilters").onclick=e=>{const c=e.target.closest(".chip");if(!c)return;activeSrc=c.dataset.src;render();};
wireDrop(document.body);
loadCommitted();
</script>
</body>
</html>
